# Unity Build Check
name: Unity Build Check

on:
  pull_request:
      paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/unity-build-check.yml'

  workflow_dispatch:

# 同一PRへの連続プッシュで古いrunをキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Restore Library Cache
        uses: actions/cache/restore@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Packages/**', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Build (check only)
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: StandaloneWindows64
          unityVersion: 6000.0.41f1
          versioning: None
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Save Library Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Packages/**', 'ProjectSettings/ProjectVersion.txt') }}